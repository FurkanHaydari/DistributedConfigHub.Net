version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: confighub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ConfigHubDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: confighub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Uygulama bağlantı portu
      - "15672:15672" # Tarayıcı Yönetim Ekranı portu
    restart: unless-stopped

volumes:
  postgres_data:
